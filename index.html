<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Landing Page</title>
    <meta name="description" content="포트폴리오 폴더 테마의 크리에이티브 랜딩 페이지">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="container">
        <div class="folder-wrapper">

            <!-- Folder Back Flap -->
            <div class="folder-back">
                <!-- Tab: ABOUT ME -->
                <div class="tab-about-me" id="tab-about-me">
                    <span>ABOUT ME</span>
                </div>
            </div>

            <!-- Folder Inserts (File Icons/Tabs) -->
            <div class="folder-inserts">

                <!-- Insert 1: UXUI DESIGN (Purple Starburst) -->
                <a href="#uxui" class="insert-uxui" id="insert-uxui" title="UX/UI Design Portfolio">
                    <div class="starburst-container">
                        <svg width="100%" height="100%" viewBox="0 0 160 160">
                            <polygon id="starburst-uxui" points="" fill="#9a679c" />
                        </svg>
                        <div class="insert-text">
                            UXUI<br>DESIGN
                        </div>
                    </div>
                </a>

                <!-- Insert 2: LAYOUT (Pink Oval) -->
                <a href="#layout" class="insert-layout" id="insert-layout" title="Layout Design Portfolio">
                    <div class="oval-shape">
                        <span>LAYOUT</span>
                    </div>
                </a>

                <!-- Insert 3: IDEA (Green Starburst) -->
                <a href="#idea" class="insert-idea" id="insert-idea" title="Idea & Strategy Portfolio">
                    <div class="starburst-container">
                        <svg width="100%" height="100%" viewBox="0 0 160 160">
                            <polygon id="starburst-idea" points="" fill="#52c383" />
                        </svg>
                        <div class="insert-text">
                            IDEA
                        </div>
                    </div>
                </a>

                <!-- Insert 4: BRANDING (Orange Dome) -->
                <a href="#branding" class="insert-branding" id="insert-branding" title="Branding Portfolio">
                    <div class="dome-shape">
                        <span>BRANDING</span>
                    </div>
                </a>

            </div>

            <!-- Folder Front Flap -->
            <div class="folder-front">
                <div class="logo-container">
                    <h1 class="logo-title">
                        <img src="img/covertext.png" alt="portfolio" class="logo-image">
                    </h1>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Helper function to dynamically calculate and generate spiky starburst polygons
            const makeStarburst = (elementId, spikes, outerRadius, innerRadius) => {
                const el = document.getElementById(elementId);
                if (!el) return;

                const center = 80; // Center coordinate of 160x160 viewBox
                const points = [];

                for (let i = 0; i < spikes * 2; i++) {
                    // Subtract Math.PI / 2 to start the drawing from the top center
                    const angle = (i * Math.PI) / spikes - Math.PI / 2;
                    const r = (i % 2 === 0) ? outerRadius : innerRadius;
                    const x = center + r * Math.cos(angle);
                    const y = center + r * Math.sin(angle);
                    points.push(`${x.toFixed(1)},${y.toFixed(1)}`);
                }

                el.setAttribute("points", points.join(" "));
            };

            // Generate the spiky shapes matching the user's reference image
            makeStarburst("starburst-uxui", 14, 76, 56);
            makeStarburst("starburst-idea", 22, 76, 62);
        });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Landing Page</title>
    <meta name="description" content="포트폴리오 폴더 테마의 크리에이티브 랜딩 페이지">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <!-- Custom Cursor Badge -->
    <div id="custom-cursor" class="custom-cursor">
        <svg class="custom-cursor-arrow" width="18" height="18" viewBox="0 0 24 24">
            <path d="M4.5 3v15.3l4.7-4.7 3.5 7 2.8-1.4-3.5-7h6.6L4.5 3z" fill="#000000" stroke="#ffffff"
                stroke-width="1.5" />
        </svg>
        <span class="custom-cursor-text">Click</span>
    </div>

    <div class="scroll-container">

        <!-- Section 1: Welcome -->
        <section class="section-full section-welcome">

            <!-- Top Right Stats (OS Window Style) -->
            <div class="welcome-stats">
                <div class="stat-card os-style" id="stat1">
                    <div class="os-window-header">
                        <div class="os-dots">
                            <span class="dot close"></span>
                            <span class="dot minimize"></span>
                            <span class="dot maximize"></span>
                        </div>
                    </div>
                    <div class="stat-content">
                        <span class="stat-number">2</span>
                        <span class="stat-label">PROJECTS</span>
                    </div>
                </div>
                <div class="stat-card os-style" id="stat2">
                    <div class="os-window-header">
                        <div class="os-dots">
                            <span class="dot close"></span>
                            <span class="dot minimize"></span>
                            <span class="dot maximize"></span>
                        </div>
                    </div>
                    <div class="stat-content">
                        <span class="stat-number">8+</span>
                        <span class="stat-label">TOOLS</span>
                    </div>
                </div>
                <div class="stat-card os-style" id="stat3">
                    <div class="os-window-header">
                        <div class="os-dots">
                            <span class="dot close"></span>
                            <span class="dot minimize"></span>
                            <span class="dot maximize"></span>
                        </div>
                    </div>
                    <div class="stat-content">
                        <span class="stat-number">100%</span>
                        <span class="stat-label">VIBE CODED</span>
                    </div>
                </div>
            </div>

            <!-- Main Text -->
            <div class="welcome-text-container">
                <h1 class="welcome-title">FROM IDEA<br>TO EXPERIENCE</h1>
                <p class="welcome-subtitle"></p>
            </div>

            <!-- Scroll Indicator -->
            <div class="scroll-indicator">
                <div class="mouse-icon">
                    <div class="wheel"></div>
                </div>
                <span>scroll</span>
            </div>

        </section>

        <!-- Section 2: Profile -->
        <section class="section-full section-profile">
            <header class="profile-header">
                <h2>PROFILE</h2>
                <p>더 나은 경험을 디자인합니다</p>
            </header>
            <div class="os-window">
                <div class="os-window-header">
                    <div class="os-dots">
                        <span class="dot close"></span>
                        <span class="dot minimize"></span>
                        <span class="dot maximize"></span>
                    </div>
                    <div class="os-title">Profill Viewer</div>
                </div>
                <div class="os-window-content">
                    <img src="img/profill.jpg" alt="Profile Details" class="profile-display-image">
                </div>
            </div>
        </section>

        <!-- Section 3: Tools & Folder -->
        <section class="section-full section-tools-folder">
            <div class="tools-panel">
                <div class="tools-header-badge">TOOLS USED</div>

                <div class="tools-category">
                    <h3 class="tools-cat-title">DESIGN</h3>
                    <div class="badge-group">
                        <span class="tool-badge"><span class="color-dot figma"></span> Figma</span>
                        <span class="tool-badge"><span class="color-dot stitch"></span> Stitch AI</span>
                    </div>
                </div>

                <div class="tools-category">
                    <h3 class="tools-cat-title">AI</h3>
                    <div class="badge-group">
                        <span class="tool-badge"><span class="color-dot gemini"></span> Gemini</span>
                        <span class="tool-badge"><span class="color-dot claude"></span> Claude</span>
                        <span class="tool-badge"><span class="color-dot chatgpt"></span> ChatGPT</span>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 16px; margin-top: 30px;">
                    <div class="badge-group">
                        <span class="tool-badge border-only"><span class="icon-dev">⚙️</span> Dev tools</span>
                    </div>
                    <div class="badge-group">
                        <span class="tool-badge border-only">GitHub</span>
                        <span class="tool-badge border-only">Vercel</span>
                        <span class="tool-badge border-only">Firebase</span>
                    </div>
                </div>
            </div>

            <!-- Existing Folder Wrapper -->
            <div class="folder-wrapper">

                <!-- Folder Back Flap -->
                <div class="folder-back">
                    <!-- Tab: ABOUT ME -->
                    <div class="tab-about-me" id="tab-about-me">
                        <span>ABOUT ME</span>
                    </div>
                </div>

                <!-- Folder Inserts (File Icons/Tabs) -->
                <div class="folder-inserts">

                    <!-- Insert 1: UXUI DESIGN (Purple Starburst) -->
                    <a href="subpage.html" class="insert-uxui" id="insert-uxui" title="UX/UI Design Portfolio">
                        <div class="starburst-container">
                            <svg width="100%" height="100%" viewBox="0 0 160 160">
                                <polygon id="starburst-uxui" points="" fill="#9a679c" />
                            </svg>
                            <div class="insert-text">
                                UXUI<br>DESIGN
                            </div>
                        </div>
                    </a>

                    <!-- Insert 2: LAYOUT (Pink Oval) -->
                    <a href="subpage.html" class="insert-layout" id="insert-layout" title="Layout Design Portfolio">
                        <div class="oval-shape">
                            <span>LAYOUT</span>
                        </div>
                    </a>

                    <!-- Insert 3: IDEA (Green Starburst) -->
                    <a href="subpage.html" class="insert-idea" id="insert-idea" title="Idea & Strategy Portfolio">
                        <div class="starburst-container">
                            <svg width="100%" height="100%" viewBox="0 0 160 160">
                                <polygon id="starburst-idea" points="" fill="#52c383" />
                            </svg>
                            <div class="insert-text">
                                IDEA
                            </div>
                        </div>
                    </a>

                    <!-- Insert 4: BRANDING (Orange Dome) -->
                    <a href="subpage.html" class="insert-branding" id="insert-branding" title="Branding Portfolio">
                        <div class="dome-shape">
                            <span>BRANDING</span>
                        </div>
                    </a>

                </div>

                <!-- Folder Front Flap -->
                <a href="subpage.html" class="folder-front" id="folder-front" title="">
                    <div class="logo-container">
                        <h1 class="logo-title">
                            <img src="img/covertext.png" alt="portfolio" class="logo-image">
                        </h1>
                    </div>
                </a>

            </div>
        </section>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Helper function to dynamically calculate and generate spiky starburst polygons
            const makeStarburst = (elementId, spikes, outerRadius, innerRadius) => {
                const el = document.getElementById(elementId);
                if (!el) return;

                const center = 80; // Center coordinate of 160x160 viewBox
                const points = [];

                for (let i = 0; i < spikes * 2; i++) {
                    // Subtract Math.PI / 2 to start the drawing from the top center
                    const angle = (i * Math.PI) / spikes - Math.PI / 2;
                    const r = (i % 2 === 0) ? outerRadius : innerRadius;
                    const x = center + r * Math.cos(angle);
                    const y = center + r * Math.sin(angle);
                    points.push(`${x.toFixed(1)},${y.toFixed(1)}`);
                }

                el.setAttribute("points", points.join(" "));
            };

            // Generate the spiky shapes matching the user's reference image
            makeStarburst("starburst-uxui", 14, 76, 56);
            makeStarburst("starburst-idea", 22, 76, 62);

            // Custom floating cursor badge tracking globally
            const cursor = document.getElementById("custom-cursor");
            const frontFlap = document.querySelector(".folder-front");

            document.addEventListener("mousemove", (e) => {
                // Using requestAnimationFrame for high-performance screen refresh rate alignment
                window.requestAnimationFrame(() => {
                    cursor.style.left = `${e.clientX}px`;
                    cursor.style.top = `${e.clientY}px`;
                });
            });

            // Show cursor when mouse enters the viewport
            document.addEventListener("mouseenter", () => {
                cursor.classList.add("active");
            });

            // Hide cursor when mouse leaves the viewport
            document.addEventListener("mouseleave", () => {
                cursor.classList.remove("active");
            });

            // Show cursor text only when hovering over the front flap
            if (frontFlap) {
                frontFlap.addEventListener("mouseenter", () => {
                    cursor.classList.add("show-text");
                });
                frontFlap.addEventListener("mouseleave", () => {
                    cursor.classList.remove("show-text");
                });
            }

            // Show by default if mouse is already in the viewport
            cursor.classList.add("active");
        });
    </script>

</body>

</html>
